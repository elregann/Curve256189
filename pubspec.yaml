name: curve256189

description: >
  Curve256189: SafeCurves-compliant (11/11) Montgomery elliptic curve 
  with novel FPOW post-quantum hardening layer. Formally verified via SageMath. 
  Production-ready Dart cryptography library.

version: 1.0.0-beta.1

homepage: https://github.com/elregann/Curve256189
repository: https://github.com/elregann/Curve256189
documentation: https://github.com/elregann/Curve256189#readme

license: MIT

keywords:
  - cryptography
  - ecc
  - elliptic-curve
  - safecurves
  - post-quantum
  - fpow
  - montgomery-curve
  - eddsa
  - ecdh
  - edwards-curve

topics:
  - cryptography
  - security
  - ecc
  - blockchain

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  crypto: ^3.0.3
  pointycastle: ^3.7.3

dev_dependencies:
  lints: ^3.0.0
  test: ^1.24.0